[changelog]
header = """
# Changelog

All notable changes to this marketplace are documented here.
Entries are grouped by plugin.\n
"""
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="scope") %}\
### {{ group | default(value="marketplace") }}{% if version and group %} `v{{ version | trim_start_matches(pat="v") }}`{% endif %}

{% for commit in commits %}\
- **{{ commit.group }}**: {{ commit.message | upper_first }}
{% endfor %}
{% endfor %}\
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
sort_commits = "oldest"
commit_preprocessors = [
  # Strip the [BRANCH][INITIALS] prefix before parsing
  { pattern = '^\[[^\]]*\]\[[^\]]*\] ', replace = "" },
]
commit_parsers = [
  { message = "^feat", group = "feat" },
  { message = "^fix", group = "fix" },
  { message = "^docs", group = "docs" },
  { message = "^refactor", group = "refactor" },
  { message = "^perf", group = "perf" },
  { message = "^test", group = "test" },
  { message = "^chore", group = "chore" },
  { message = "^ci", group = "ci" },
  { message = "^style", group = "style" },
  { message = "^build", group = "build" },
  { message = "^revert", group = "revert" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
